<!-- {% load static %} -->

<!DOCTYPE html>
<html lang="es">

<head>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Error 404 - Página no encontrada</title>

    <style>
        body {
            background-color: #ffffff;
        }

        .navbar {
            background-color: #f8d7da;
        }

        .hero {
            background-color: #e3f2fd;
            padding: 60px;
            border-radius: 15px;
        }

        .card {
            background-color: #fff9e6;
            border: none;
            border-radius: 15px;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .btn-art {
            background-color: #c8e6c9;
            border: none;
        }

        footer {
            margin-top: 40px;
            padding: 20px;
            background-color: #f8d7da;
        }
    </style>

</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg">
        <div class="container">

            <a class="navbar-brand fw-bold" href="{% url 'inicio' %}">
                🎨 Artesanías
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'clientes_list' %}">Clientes</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="">Proveedores</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="">Productos</a>
                    </li>

                </ul>

            </div>
        </div>
    </nav>


    <!-- HERO -->
    {% block CardSection %}

        <div class="container mt-5">

            <div class="hero text-center">

                <h1 class="display-6">No existe el cliente indicado</h1>

            </div>

        </div>

    {% endblock %}


            <!-- FOOTER -->

        <footer class="text-center">

            <p>© 2026 - maraartesanias</p>

        </footer>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJwVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</body>

</html>
