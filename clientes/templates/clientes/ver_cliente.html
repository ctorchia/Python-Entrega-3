{% load static %}

<!DOCTYPE html>
<html lang="es">

<head>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cliente</title>

    <style>
        body {
            background-color: #fdf6f0;
        }

        .navbar {
            background-color: #f8d7da;
        }

        .card-art {
            background-color: #fff9e6;
            border: none;
            border-radius: 15px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        }

        .btn-art {
            background-color: #c8e6c9;
            border: none;
        }

        .label {
            font-weight: bold;
        }
    </style>

</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg">
        <div class="container">

            <a class="navbar-brand fw-bold" href="{% url 'inicio' %}">
                🎨 Artesanías
            </a>

        </div>
    </nav>


    <!-- CONTENIDO -->

    <div class="container mt-5 d-flex justify-content-center">

        <div class="card card-art p-4" style="width: 28rem;">

            <h3 class="text-center mb-4">👤 Cliente</h3>

            <p><span class="label">Nombre:</span> {{ cliente.nombre }}</p>

            <p><span class="label">Apellido:</span> {{ cliente.apellido }}</p>

            <p><span class="label">Fecha de nacimiento:</span>
                {{ cliente.fecha_de_nacimiento|default:"-" }}
            </p>

            <p><span class="label">N° Cliente:</span> {{ cliente.nro_cliente }}</p>

            <p><span class="label">DNI:</span> {{ cliente.dni }}</p>

            <p><span class="label">Email:</span> {{ cliente.email }}</p>

            <div class="text-center mt-3">

                <a href="{% url 'clientes_list' %}" class="btn btn-art">
                    Volver
                </a>

            </div>

        </div>

    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
